<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <link href="APlayer.min.css" rel="stylesheet">
  <script src="APlayer.min.js"></script>
  <title>
    <%= htmlWebpackPlugin.options.title %>
  </title>
  <style>
    * {
      margin: 0;
    }

    .top {
      height: 28px;
      background-color: #545652;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      padding-left: 0;
      margin-bottom: 0;
      list-style: none;
    }

    .top-menu {
      margin-left: 10px;
    }

    .top-menu li a {
      font-size: 12px;
      line-height: 12px;
      color: #aaa;
    }

    .nav-link {
      text-decoration: none;
      padding: 0 5px;
    }

    .head {
      float: left;
      width: 100%;
      background: #e3e9e2;
    }

    .head_top {
      width: 72%;
      margin: 0 auto;
      border-bottom: 1px solid #b4b1b1d4;
    }

    .nav-logo {
      display: inline-block;
      width: 30%;
      min-height: 32px;
      /* background: #d3dce6; */
      font-family: "zcool";
      line-height: 75px;
      font-size: 30px;
      color: #FF8C00;
    }

    .search {
      float: right;
      width: 60%;
      margin-left: 10%;
      min-height: 36px;
      margin-top: 20px;
      /* background: #e5e9f2; */
    }

    .search-content {
      float: left;
      width: 280px;
      border: 0;
      /* outline: none; */
      padding: 10px;
      border-radius: 5px 0 0 5px;
      /* background-color: transparent; */
      background-color: #fff;
    }

    .search-btn {
      border: 0px;
      float: left;
      width: 46px;
      outline: none;
      height: 36px;
      border-radius: 0px 5px 5px 0px;
      background-color: #aaaaaa;
      color: #FFF;
      text-align: center;
      line-height: 28px;
    }

    .head_bottom {
      width: 72%;
      line-height: 39px;
      margin: 0 auto;
    }

    .menu {
      float: left;
      width: 72%;
      padding: 0;
    }

    .menu li {
      display: inline-block;
      font-size: 13px;
      margin-right: 30px;
    }

    .text-info {
      color: #17a2b8 !important;
    }

    @media screen and (max-width: 768px) {
      .nav-logo {
        font-size: 18px;
        width: 45%;
        min-height: 48px;
      }

      .search {
        width: 45%;
        min-height: 48px;
      }

      .search-content {
        width: 60px;
      }

      .menu {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="top">
    <ul class="nav top-menu">
      <li class="nav-item">
        <a href="#" class="nav-link">音乐</a>
      </li>
      <li class="nav-item">
        <a href="#" class="nav-link">视频</a>
      </li>
      <li class="nav-item">
        <a href="#" class="nav-link">直播</a>
      </li>
      <li class="nav-item">
        <a href="#" class="nav-link">探索</a>
      </li>
    </ul>
  </div>
  <div class="head">
    <div class="head_top">
      <div class="row">
        <div class="nav-logo">互联网信息协会</div>
        <div class="search">
          <!-- <input class="search-content" type="text" placeholder="搜索歌曲.." oninput="handleInput(event)">
          <button class="search-btn" @click="handleInput(event)">搜索</button> -->
          <input class="search-content" type="text" placeholder="搜索...(开发中)">
          <button class="search-btn" id="search-button">搜索</button>
          <!-- <span style="font-size: 13px;float: right;color: #17a2b8;">刷新</span> -->
          <!-- <button id="refresh-button">
            <span class="refresh-icon"></span>
            刷新
          </button> -->
        </div>
      </div>
    </div>
    <div class="head_bottom">
      <ul class="menu">
        <li class="nav-item">
          <a href="/home" class="nav-link text-info">首页</a>
        </li>
        <li class="nav-item">
          <a href="/xhkk" class="nav-link text-info">协会概况</a>
        </li>
        <li class="nav-item">
          <a href="/zxdt" class="nav-link text-info">最新动态</a>
        </li>
        <li class="nav-item">
          <a href="/zxwd" class="nav-link text-info">资讯问答</a>
        </li>
        <li class="nav-item">
          <a href="/zxzx" class="nav-link text-info">下载中心</a>
        </li>
        <li class="nav-item">
          <a href="/about" class="nav-link text-info">联系我们</a>
        </li>
      </ul>
    </div>
  </div>
  <div id="aplayer"></div>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>

<script>
  const ap = new APlayer({
    container: document.getElementById('aplayer'),
    fixed: true,
    audio: [{
      name: '罗生门',
      artist: '梨冻紧',
      url: 'http://ganxy03.cn/music/%E7%BD%97%E7%94%9F%E9%97%A8.mp3',
      cover: 'cover.jpg'
    }]
  });
  ap.init();

</script>
